name: Sync researchmap

on:
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Sync public researchmap data
        run: node scripts/sync-researchmap.mjs

      - name: Commit changes
        run: |
          if [ -z "$(git status --porcelain data/researchmap.json data/researchmap.generated.js)" ]; then
            echo "No researchmap changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/researchmap.json data/researchmap.generated.js
          git commit -m "Sync researchmap data"
          git push
